name: example-mdc

# example-mdc: scan a deliberately vulnerable image with the Defender for Cloud CLI,
# anchor its SARIF to the Dockerfile via the action consumed as an external user
# would (pinned @main, which builds the action from source at that commit), and
# verify the enriched SARIF. The repo's own end-to-end test lives in
# e2e-test.yml (uses: ./). Requires repository secrets:
#   DEFENDER_TENANT_ID / DEFENDER_CLIENT_ID / DEFENDER_CLIENT_SECRET
on:
  pull_request:
    paths:
      - ".github/workflows/example-mdc.yml"
      - ".github/example/**"

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  example-mdc:
    runs-on: ubuntu-latest
    env:
      IMAGE: example-anchor:test
      DOCKERFILE: .github/example/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build the test image
        run: docker build -f "$DOCKERFILE" -t "$IMAGE" .github/example

      # Export the locally-built image to a docker-archive tar. The Defender
      # CLI resolver only accepts a local artifact (OCI dir / tar) or a
      # pullable registry reference; a bare local-daemon tag logs
      # "pkg/resolver : No suitable resolver found". A tar file resolves
      # cleanly ("Image resolved") on Docker-based runners.
      - name: Export image to a tar (deterministic scanner input)
        run: docker save "$IMAGE" -o image.tar

      - name: Download Defender for Cloud CLI
        run: curl -L -o defender "https://aka.ms/defender-cli_linux-x64" && chmod +x defender

      - name: Defender image scan + SBOM
        env:
          DEFENDER_TENANT_ID: ${{ secrets.DEFENDER_TENANT_ID }}
          DEFENDER_CLIENT_ID: ${{ secrets.DEFENDER_CLIENT_ID }}
          DEFENDER_CLIENT_SECRET: ${{ secrets.DEFENDER_CLIENT_SECRET }}
        run: |
          ./defender scan image image.tar --scanner mdvm     --defender-output image.sarif
          ./defender scan sbom  image.tar --scanner mdvmsbom --defender-output sbom.sarif --output sbom.cyclonedx.json
          test -s image.sarif && test -s sbom.cyclonedx.json \
            || { echo "::error::Defender scan produced no SARIF/SBOM — check the DEFENDER_* token secrets are valid and unexpired"; exit 1; }

      # Consume the action as an external user would, pinned to @main. Because
      # @main is a non-tag ref, the action builds its binary from the action
      # source at that commit; pin a vX.Y.Z release tag instead to download the
      # matching prebuilt binary.
      - name: Anchor MDVM SARIF to Dockerfile (released action @main)
        id: anchor
        uses: fuj1g0n/sarif-dockerfile-anchor@main
        with:
          sarif: image.sarif
          sbom: sbom.cyclonedx.json
          dockerfile: ${{ env.DOCKERFILE }}
          output: image.enriched.sarif

      - name: Verify enriched SARIF
        run: |
          set -euo pipefail
          OUT="${{ steps.anchor.outputs.sarif }}"
          test -f "$OUT" || { echo "::error::enriched SARIF not produced"; exit 1; }
          jq -e '.runs[0].results' "$OUT" >/dev/null
          ANCHORED=$(jq --arg df "$DOCKERFILE" \
            '[.runs[].results[]? | select(.locations[]?.physicalLocation.artifactLocation.uri == $df)] | length' "$OUT")
          echo "results anchored to $DOCKERFILE: $ANCHORED"  # clean image may yield 0 findings

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.anchor.outputs.sarif }}
          category: defender-mdvm-example

        # GitHub only posts the github-advanced-security onboarding comment
        # (with a link to the PR's code scanning results) the first time a new
        # code-scanning configuration is introduced. For an already-onboarded
        # config like this one it never reappears, so post the same results-list
        # link ourselves as a sticky comment.
      - name: Comment a link to this PR's code scanning results
        if: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        env:
          SARIF: ${{ steps.anchor.outputs.sarif }}
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const url = `https://github.com/${owner}/${repo}/security/code-scanning?query=pr%3A${pr}+is%3Aopen`;
            const sev = { critical: 0, high: 0, medium: 0, low: 0 };
            let total = 0;
            try {
              const sarif = JSON.parse(fs.readFileSync(process.env.SARIF, 'utf8'));
              for (const run of sarif.runs || []) {
                const score = {};
                for (const rule of run.tool?.driver?.rules || []) {
                  const s = rule.properties?.['security-severity'];
                  if (s !== undefined) score[rule.id] = Number(s);
                }
                for (const res of run.results || []) {
                  total++;
                  const s = score[res.ruleId];
                  if (s >= 9.0) sev.critical++;
                  else if (s >= 7.0) sev.high++;
                  else if (s >= 4.0) sev.medium++;
                  else if (s > 0.0) sev.low++;
                  else if (res.level === 'error') sev.high++;
                  else if (res.level === 'note') sev.low++;
                  else sev.medium++;
                }
              }
            } catch (e) {
              core.warning(`Could not read SARIF for finding counts: ${e.message}`);
            }
            const marker = '<!-- defender-mdvm-scan-results -->';
            const body = [
              marker,
              '## Defender (MDVM) code scanning results',
              '',
              `**${total}** finding(s) were uploaded to GitHub code scanning for this pull request.`,
              '',
              `Severity breakdown \u2014 Critical: ${sev.critical}, High: ${sev.high}, Medium: ${sev.medium}, Low: ${sev.low}.`,
              '',
              `- **[View all code scanning alerts for this pull request](${url})**`,
              '',
              'Individual alerts are also annotated inline on the **Files changed** tab.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr, per_page: 100,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
