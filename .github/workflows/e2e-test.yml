name: e2e-test

# End-to-end self-test: build a deliberately vulnerable image, scan it with the
# Defender for Cloud CLI, anchor its SARIF to the Dockerfile via the in-repo
# action (uses: ./, built from the source in this checkout), and verify the
# enriched SARIF. Runs on every pull request so any change is exercised against
# the action's own code. Requires repository secrets:
#   DEFENDER_TENANT_ID / DEFENDER_CLIENT_ID / DEFENDER_CLIENT_SECRET
on:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    env:
      IMAGE: example-anchor:test
      DOCKERFILE: .github/example/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build the test image
        run: docker build -f "$DOCKERFILE" -t "$IMAGE" .github/example

      # Export the locally-built image to a docker-archive tar. The Defender
      # CLI resolver only accepts a local artifact (OCI dir / tar) or a
      # pullable registry reference; a bare local-daemon tag logs
      # "pkg/resolver : No suitable resolver found". A tar file resolves
      # cleanly ("Image resolved") on Docker-based runners.
      - name: Export image to a tar (deterministic scanner input)
        run: docker save "$IMAGE" -o image.tar

      - name: Download Defender for Cloud CLI
        run: curl -L -o defender "https://aka.ms/defender-cli_linux-x64" && chmod +x defender

      - name: Defender image scan + SBOM
        env:
          DEFENDER_TENANT_ID: ${{ secrets.DEFENDER_TENANT_ID }}
          DEFENDER_CLIENT_ID: ${{ secrets.DEFENDER_CLIENT_ID }}
          DEFENDER_CLIENT_SECRET: ${{ secrets.DEFENDER_CLIENT_SECRET }}
        run: |
          ./defender scan image image.tar --scanner mdvm     --defender-output image.sarif
          ./defender scan sbom  image.tar --scanner mdvmsbom --defender-output sbom.sarif --output sbom.cyclonedx.json
          test -s image.sarif && test -s sbom.cyclonedx.json \
            || { echo "::error::Defender scan produced no SARIF/SBOM — check the DEFENDER_* token secrets are valid and unexpired"; exit 1; }

      # Consume the action from this checkout (uses: ./): GITHUB_ACTION_REF is
      # empty, so the action builds its binary from the source in this PR and
      # exercises current behaviour — including transitive dependency anchoring
      # (link-transitive, default true).
      - name: Anchor MDVM SARIF to Dockerfile (built from source)
        id: anchor
        uses: ./
        with:
          sarif: image.sarif
          sbom: sbom.cyclonedx.json
          dockerfile: ${{ env.DOCKERFILE }}
          output: image.enriched.sarif

      - name: Verify enriched SARIF
        run: |
          set -euo pipefail
          OUT="${{ steps.anchor.outputs.sarif }}"
          test -f "$OUT" || { echo "::error::enriched SARIF not produced"; exit 1; }
          jq -e '.runs[0].results' "$OUT" >/dev/null
          ANCHORED=$(jq --arg df "$DOCKERFILE" \
            '[.runs[].results[]? | select(.locations[]?.physicalLocation.artifactLocation.uri == $df)] | length' "$OUT")
          echo "results anchored to $DOCKERFILE: $ANCHORED"  # clean image may yield 0 findings

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.anchor.outputs.sarif }}
          category: defender-mdvm-e2e
