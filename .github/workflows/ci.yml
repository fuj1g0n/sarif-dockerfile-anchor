name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "true"

      - name: Lint
        run: devbox run lint

      - name: Check formatting
        run: |
          devbox run fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::code is not formatted; run 'devbox run fmt'"
            git --no-pager diff
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "true"

      - name: Vet
        run: devbox run vet

      - name: Test (race + coverage)
        run: devbox run -- go test ./... -race -count=1 -covermode=atomic -coverprofile=coverage.out

      - name: Enforce coverage threshold
        run: |
          threshold=80.0
          total=$(devbox run -- go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (threshold ${threshold}%)"
          awk -v c="$total" -v t="$threshold" 'BEGIN { exit (c+0 >= t+0) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the ${threshold}% threshold"
            exit 1
          }

      - name: Build
        run: devbox run build

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
