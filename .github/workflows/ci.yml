name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install golangci-lint
        # Pinned to match the version used locally via devbox.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: Lint
        run: golangci-lint run ./...

      - name: Check formatting
        run: |
          golangci-lint fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::code is not formatted; run 'devbox run fmt'"
            git --no-pager diff
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # "1.24" enforces the go.mod floor (proves the minimum is honest);
        # "stable" tracks the latest toolchain used for releases.
        go: ["1.24", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: go test ./... -race -count=1 -covermode=atomic -coverprofile=coverage.out

      - name: Enforce coverage threshold
        run: |
          threshold=80.0
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (threshold ${threshold}%)"
          awk -v c="$total" -v t="$threshold" 'BEGIN { exit (c+0 >= t+0) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the ${threshold}% threshold"
            exit 1
          }

      - name: Build
        run: go build ./...

      - name: Upload coverage profile
        if: matrix.go == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
