name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Build
        run: go build ./...
