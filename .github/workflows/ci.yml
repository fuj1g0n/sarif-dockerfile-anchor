name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Lint
        run: nix develop -c make lint

      - name: Check formatting
        run: |
          nix develop -c make fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::code is not formatted; run 'nix develop -c make fmt'"
            git --no-pager diff
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Vet
        run: nix develop -c make vet

      - name: Test (race + coverage)
        run: nix develop -c go test ./... -race -count=1 -covermode=atomic -coverprofile=coverage.out

      - name: Enforce coverage threshold
        run: |
          threshold=80.0
          total=$(nix develop -c go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (threshold ${threshold}%)"
          awk -v c="$total" -v t="$threshold" 'BEGIN { exit (c+0 >= t+0) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the ${threshold}% threshold"
            exit 1
          }

      - name: Build
        run: nix develop -c make build

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
