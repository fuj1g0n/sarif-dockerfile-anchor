name: "SARIF Dockerfile Anchor"
description: >-
  Anchor Microsoft Defender (MDVM) container-image SARIF findings to the
  Dockerfile lines that introduced the packages, so GitHub code scanning can
  show them as pull-request inline annotations and diff gates.
author: "fuj1g0n"
branding:
  icon: "crosshair"
  color: "blue"

inputs:
  sarif:
    description: "Path to the Defender CLI image-scan SARIF file."
    required: true
  sbom:
    description: "Path to the CycloneDX SBOM JSON file."
    required: true
  dockerfile:
    description: "Path to the Dockerfile to anchor findings to."
    required: true
    default: "Dockerfile"
  base-severity:
    description: "Comma-separated severities of base-image OS findings kept as inline annotations."
    required: false
    default: "high,critical"
  link-transitive:
    description: >-
      Anchor transitive OS dependencies to the install line of the nearest
      package that pulled them in (via the SBOM dependency graph). When false,
      such findings fall back to the base FROM line.
    required: false
    default: "true"
  dockerfile-uri:
    description: "Repo-relative URI written into the SARIF artifactLocation (default: value of dockerfile)."
    required: false
    default: ""
  output:
    description: "Path to write the enriched SARIF (must be a file so it can be uploaded)."
    required: false
    default: "enriched.sarif"
  github-token:
    description: "Token used to download release assets when pinned to a release tag."
    required: false
    default: ${{ github.token }}

outputs:
  sarif:
    description: "Path to the enriched SARIF file."
    value: ${{ steps.run.outputs.sarif }}

runs:
  using: "composite"
  steps:
    # Decide how to obtain the binary from the ref the action is pinned at.
    # An exact release tag (vX.Y.Z) downloads the matching prebuilt asset; any
    # other ref (a branch, a SHA, @main, or a local ./ checkout) builds the
    # action source at that exact commit, so behaviour is tied to the pinned
    # commit and no `version` input is needed.
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail
        REF="${GITHUB_ACTION_REF:-}"
        if printf '%s' "${REF}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          MODE=download
        else
          MODE=build
        fi
        echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"
        echo "anchor: mode=${MODE} (action ref: ${REF:-local})"

    # --- build path: any non-release-tag ref ----------------------------------
    # Build the binary with the same devbox-pinned Go toolchain that CI uses,
    # from the action source checked out at this ref.
    - if: steps.resolve.outputs.mode == 'build'
      uses: jetify-com/devbox-install-action@v0.15.0
      with:
        project-path: ${{ github.action_path }}
        enable-cache: "true"

    - id: build
      if: steps.resolve.outputs.mode == 'build'
      shell: bash
      run: |
        set -euo pipefail
        BIN="${RUNNER_TEMP}/sarif-dockerfile-anchor"
        if [ "${RUNNER_OS}" = "Windows" ]; then BIN="${BIN}.exe"; fi
        echo "Building sarif-dockerfile-anchor from ${{ github.action_path }} (ref ${GITHUB_ACTION_REF:-local})"
        ( cd "${{ github.action_path }}" && devbox run -- go build -o "${BIN}" ./cmd/sarif-dockerfile-anchor )
        echo "bin=${BIN}" >> "${GITHUB_OUTPUT}"

    # --- download path: exact release tags ------------------------------------
    - id: download
      if: steps.resolve.outputs.mode == 'download'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        REPO="fuj1g0n/sarif-dockerfile-anchor"
        VERSION="${GITHUB_ACTION_REF}"
        NUM="${VERSION#v}"

        # --- map runner OS/arch to GoReleaser asset names ---
        case "${RUNNER_OS}" in
          Linux)   OS=linux ;;
          macOS)   OS=darwin ;;
          Windows) OS=windows ;;
          *) echo "::error::unsupported RUNNER_OS=${RUNNER_OS}"; exit 1 ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)   ARCH=amd64 ;;
          ARM64) ARCH=arm64 ;;
          *) echo "::error::unsupported RUNNER_ARCH=${RUNNER_ARCH}"; exit 1 ;;
        esac

        EXT="tar.gz"; BIN="sarif-dockerfile-anchor"
        if [ "${OS}" = "windows" ]; then EXT="zip"; BIN="sarif-dockerfile-anchor.exe"; fi
        ASSET="sarif-dockerfile-anchor_${NUM}_${OS}_${ARCH}.${EXT}"
        URL="https://github.com/${REPO}/releases/download/${VERSION}/${ASSET}"

        TMP="$(mktemp -d)"
        echo "Downloading ${URL}"
        curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -o "${TMP}/${ASSET}" "${URL}"
        if [ "${EXT}" = "zip" ]; then unzip -q "${TMP}/${ASSET}" -d "${TMP}";
        else tar -xzf "${TMP}/${ASSET}" -C "${TMP}"; fi
        echo "bin=${TMP}/${BIN}" >> "${GITHUB_OUTPUT}"

    # --- run ------------------------------------------------------------------
    - id: run
      shell: bash
      run: |
        set -euo pipefail
        # Exactly one of build/download ran; the skipped step's output is empty,
        # so the concatenation yields the single binary path.
        BIN="${{ steps.build.outputs.bin }}${{ steps.download.outputs.bin }}"
        if [ -z "${BIN}" ]; then echo "::error::no anchor binary was produced"; exit 1; fi

        ARGS=(
          --sarif         "${{ inputs.sarif }}"
          --sbom          "${{ inputs.sbom }}"
          --dockerfile    "${{ inputs.dockerfile }}"
          --base-severity "${{ inputs.base-severity }}"
          --output        "${{ inputs.output }}"
          "--link-transitive=${{ inputs.link-transitive }}"
        )
        DFURI="${{ inputs.dockerfile-uri }}"
        if [ -n "${DFURI}" ]; then ARGS+=(--dockerfile-uri "${DFURI}"); fi

        "${BIN}" "${ARGS[@]}"
        echo "sarif=${{ inputs.output }}" >> "${GITHUB_OUTPUT}"
