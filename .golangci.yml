version: "2"

run:
  timeout: 5m

linters:
  # "standard" = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
        - name: package-comments
  exclusions:
    generated: lax
    rules:
      # Test files may ignore errors from helpers and use simpler patterns.
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/fuj1g0n/sarif-dockerfile-anchor
